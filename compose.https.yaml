services:
  backend:
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost:5173,https://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5173}

  frontend:
    command: ["npm", "run", "dev:lan:https"]
    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend:8000
      VITE_HTTPS_PFX_FILE: /certs/lan-dev.pfx
      VITE_HTTPS_PFX_PASSPHRASE: ${VITE_HTTPS_PFX_PASSPHRASE:-discord-clone-local}
    volumes:
      - ./certs:/certs:ro
