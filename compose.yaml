services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: discord
      POSTGRES_DB: discord_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord -d discord_clone"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      JWT_SECRET: ${JWT_SECRET:-change-this-local-secret-32-bytes-min}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql://discord:discord@postgres:5432/discord_clone}
      REDIS_URL: ${REDIS_URL:-}
      WEBRTC_ICE_SERVERS_JSON: '${WEBRTC_ICE_SERVERS_JSON:-[{"urls":"stun:stun.l.google.com:19302"}]}'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend:8000
      VITE_DISABLE_HMR: ${VITE_DISABLE_HMR:-1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
