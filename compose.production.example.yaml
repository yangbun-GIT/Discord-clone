# Example single-server production topology.
# Copy to a deployment host, provide real secrets through a non-committed .env or
# host secret store, then run with Docker Compose. This file is intentionally an
# example and must not contain real credentials.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN to your HTTPS domain}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for certificate notices}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-discord_clone}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-discord_clone}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS to https://your-domain}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-discord_clone}
      REDIS_URL: redis://redis:6379/0
      WEBRTC_ICE_SERVERS_JSON: ${WEBRTC_ICE_SERVERS_JSON:?set STUN/TURN ICE JSON}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: runtime
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  # Optional self-hosted TURN service. For public internet tests, expose UDP 3478
  # and the configured relay range from the host firewall/security group. If using
  # a managed TURN provider instead, remove this service and keep only
  # WEBRTC_ICE_SERVERS_JSON in the backend environment.
  coturn:
    image: coturn/coturn:latest
    profiles: ["turn"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/coturn/turnserver.conf.example:/etc/coturn/turnserver.conf:ro

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
